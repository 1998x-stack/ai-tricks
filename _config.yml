# GitHub Pages Configuration
title: 深度学习调参技巧 Wiki
description: 从知乎 30+ 位一线从业者回答中提取、分类、深化的结构化知识库

# Theme
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

# Site settings
show_downloads: false
github:
  repository_url: https://github.com/1998x-stack/ai-tricks

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from build
exclude:
  - raw/
  - .claude/
  - .review-*
  - .gitignore
  - LICENSE
